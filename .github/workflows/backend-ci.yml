name: backend-ci

on:
  push:
    branches: ["main", "dev"]
    paths:
      - "api/**"
      - ".github/workflows/backend-ci.yml"
  pull_request:
    branches: ["main", "dev"]
    paths:
      - "api/**"
      - ".github/workflows/backend-ci.yml"
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: api

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          extensions: mbstring, dom, fileinfo, pdo_sqlite, sqlite3
          coverage: none
          tools: composer:v2

      - name: Get Composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> "$GITHUB_OUTPUT"

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-${{ hashFiles('api/composer.lock') }}
          restore-keys: ${{ runner.os }}-composer-

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Prepare Laravel
        run: |
          cp .env.example .env
          php artisan key:generate --ansi
          php artisan config:clear --ansi

      - name: PHP syntax check
        run: find app database routes tests -name "*.php" -print0 | xargs -0 -n1 php -l

      - name: PHPUnit
        env:
          LOG_CHANNEL: "null"
        run: vendor/bin/phpunit --do-not-cache-result
