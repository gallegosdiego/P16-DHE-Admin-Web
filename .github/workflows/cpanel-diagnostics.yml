name: cpanel-diagnostics

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  inspect:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Inspect cPanel Git deployment queue
        env:
          CPANEL_USER: ${{ secrets.CPANEL_USER }}
          CPANEL_HOST: ${{ secrets.CPANEL_HOST }}
          CPANEL_API_TOKEN: ${{ secrets.CPANEL_API_TOKEN }}
        run: |
          set -Eeuo pipefail
          diagnostic_failure=0

          for variable in CPANEL_USER CPANEL_HOST CPANEL_API_TOKEN; do
            if [ -z "${!variable:-}" ]; then
              echo "::error::Missing ${variable}."
              exit 1
            fi
          done

          call_uapi() {
            local label="$1"
            local endpoint="$2"
            local response_file
            response_file="$(mktemp)"

            echo "=== ${label} ==="
            http_code="$(curl --silent --show-error \
              --output "${response_file}" \
              --write-out '%{http_code}' \
              --max-time 30 \
              --header "Authorization: cpanel ${CPANEL_USER}:${CPANEL_API_TOKEN}" \
              --header 'Accept: application/json' \
              "https://${CPANEL_HOST}:2083/execute/${endpoint}")"

            echo "HTTP ${http_code}"
            if jq empty "${response_file}" >/dev/null 2>&1; then
              jq '
                if has("result") then
                  {format: "uapi", module, func, result}
                elif has("cpanelresult") then
                  {format: "cpanelresult", result: .cpanelresult}
                else
                  {format: "provider", result: .}
                end
              ' "${response_file}"

              if jq -e 'has("message")' "${response_file}" >/dev/null 2>&1; then
                echo "::error::$(jq -r '.message' "${response_file}")"
                diagnostic_failure=1
              elif ! jq -e '(.result.status == 1) or (.cpanelresult.event.result == 1)' "${response_file}" >/dev/null 2>&1; then
                echo "::error::cPanel did not return a successful UAPI result for ${label}."
                diagnostic_failure=1
              fi
            else
              echo "::error::cPanel returned a non-JSON response."
              head -c 500 "${response_file}"
              echo
              diagnostic_failure=1
            fi

            rm -f "${response_file}"
          }

          call_uapi \
            'Managed repository state' \
            'VersionControl/retrieve?fields=name%2Cbranch%2Clast_update%2Crepository_root'
          call_uapi \
            'Git deployment tasks' \
            'VersionControlDeployment/retrieve'
          call_uapi \
            'User task queue' \
            'UserTasks/retrieve'

          if [ "${diagnostic_failure}" -ne 0 ]; then
            exit 1
          fi
