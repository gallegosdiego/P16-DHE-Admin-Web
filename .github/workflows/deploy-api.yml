name: deploy-api

on:
  push:
    branches: ["main"]
    paths:
      - "api/**"
      - ".cpanel.yml"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via cPanel API
        env:
          CPANEL_USER: ${{ secrets.CPANEL_USER }}
          CPANEL_HOST: ${{ secrets.CPANEL_HOST }}
          CPANEL_API_TOKEN: ${{ secrets.CPANEL_API_TOKEN }}
        run: |
          set -e
          echo "=== Triggering cPanel Git pull + deploy ==="

          # Validate secrets exist
          if [ -z "$CPANEL_USER" ] || [ -z "$CPANEL_HOST" ] || [ -z "$CPANEL_API_TOKEN" ]; then
            echo "::error::Missing required secrets."
            echo "  CPANEL_USER: $([ -n "$CPANEL_USER" ] && echo 'SET' || echo 'MISSING')"
            echo "  CPANEL_HOST: $([ -n "$CPANEL_HOST" ] && echo 'SET' || echo 'MISSING')"
            echo "  CPANEL_API_TOKEN: $([ -n "$CPANEL_API_TOKEN" ] && echo 'SET' || echo 'MISSING')"
            exit 1
          fi

          REPO_ROOT="/home/${CPANEL_USER}/repositories/P16-DHE-Admin-Web"
          ENCODED_ROOT=$(python3 -c "import urllib.parse; print(urllib.parse.quote('${REPO_ROOT}', safe=''))")

          # 1. Update repo from remote (git pull)
          echo "--- Step 1: Pulling latest from remote ---"
          RESPONSE=$(curl -s -w "\n%{http_code}" \
            -H "Authorization: cpanel ${CPANEL_USER}:${CPANEL_API_TOKEN}" \
            -H "Content-Type: application/json" \
            -H "Accept: application/json" \
            "https://${CPANEL_HOST}:2083/execute/VersionControl/update?repository_root=${ENCODED_ROOT}&branch=main" \
            2>&1)

          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | head -n -1)
          echo "Update response (HTTP $HTTP_CODE): $BODY"

          if [ "$HTTP_CODE" != "200" ]; then
            # Try alternative: basic auth with user:token (some cPanel versions)
            echo "--- Retrying with Basic Auth ---"
            RESPONSE=$(curl -s -w "\n%{http_code}" \
              -u "${CPANEL_USER}:${CPANEL_API_TOKEN}" \
              -H "Content-Type: application/json" \
              -H "Accept: application/json" \
              "https://${CPANEL_HOST}:2083/execute/VersionControl/update?repository_root=${ENCODED_ROOT}&branch=main" \
              2>&1)

            HTTP_CODE=$(echo "$RESPONSE" | tail -1)
            BODY=$(echo "$RESPONSE" | head -n -1)
            echo "Update response attempt 2 (HTTP $HTTP_CODE): $BODY"

            if [ "$HTTP_CODE" != "200" ]; then
              echo "::error::cPanel update failed with HTTP $HTTP_CODE"
              exit 1
            fi
          fi

          # Check for UAPI errors
          if echo "$BODY" | grep -q '"status":0'; then
            echo "::error::cPanel UAPI error: $BODY"
            exit 1
          fi

          echo "Update successful."

          # 2. Deploy (triggers .cpanel.yml tasks)
          echo "--- Step 2: Triggering deploy ---"
          RESPONSE2=$(curl -s -w "\n%{http_code}" \
            -H "Authorization: cpanel ${CPANEL_USER}:${CPANEL_API_TOKEN}" \
            -H "Content-Type: application/json" \
            -H "Accept: application/json" \
            "https://${CPANEL_HOST}:2083/execute/VersionControl/deploy?repository_root=${ENCODED_ROOT}" \
            2>&1)

          HTTP_CODE2=$(echo "$RESPONSE2" | tail -1)
          BODY2=$(echo "$RESPONSE2" | head -n -1)
          echo "Deploy response (HTTP $HTTP_CODE2): $BODY2"

          if [ "$HTTP_CODE2" != "200" ]; then
            # Try alternative auth
            RESPONSE2=$(curl -s -w "\n%{http_code}" \
              -u "${CPANEL_USER}:${CPANEL_API_TOKEN}" \
              -H "Content-Type: application/json" \
              -H "Accept: application/json" \
              "https://${CPANEL_HOST}:2083/execute/VersionControl/deploy?repository_root=${ENCODED_ROOT}" \
              2>&1)

            HTTP_CODE2=$(echo "$RESPONSE2" | tail -1)
            BODY2=$(echo "$RESPONSE2" | head -n -1)
            echo "Deploy response attempt 2 (HTTP $HTTP_CODE2): $BODY2"

            if [ "$HTTP_CODE2" != "200" ]; then
              echo "::error::cPanel deploy failed with HTTP $HTTP_CODE2"
              exit 1
            fi
          fi

          echo "=== Deploy triggered successfully ==="

      - name: Verify deployment
        run: |
          echo "=== Verification (3 intentos, 10s entre cada uno) ==="
          for i in 1 2 3; do
            echo "--- Intento $i ---"

            # 1. Health check
            HTTP_CODE=$(curl -s -o /tmp/health.txt -w "%{http_code}" \
              --max-time 15 -H "Accept: application/json" \
              "https://api.danheiexpress.com/api/health")
            echo "Health: HTTP $HTTP_CODE — $(cat /tmp/health.txt 2>/dev/null)"

            # 2. Route check (verifica rutas críticas)
            HTTP_CODE2=$(curl -s -o /tmp/routes.txt -w "%{http_code}" \
              --max-time 15 -H "Accept: application/json" \
              "https://api.danheiexpress.com/api/deploy-check")
            ROUTES_BODY=$(cat /tmp/routes.txt 2>/dev/null || echo "")
            echo "Routes: HTTP $HTTP_CODE2 — $ROUTES_BODY"

            if [ "$HTTP_CODE" = "200" ] && [ "$HTTP_CODE2" = "200" ]; then
              echo "✅ Deploy verified — health OK + all critical routes present"
              exit 0
            fi

            if [ "$HTTP_CODE2" = "503" ]; then
              echo "::error::MISSING CRITICAL ROUTES: $ROUTES_BODY"
              echo "Run route:clear + route:cache on the server."
            fi

            if [ "$i" -lt 3 ]; then
              echo "⏳ Reintentando en 10s..."
              sleep 10
            fi
          done

          echo "::warning::Verification incomplete. Check manually: https://api.danheiexpress.com/api/deploy-check"
