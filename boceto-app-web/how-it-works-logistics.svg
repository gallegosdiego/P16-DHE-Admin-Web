      <path d="M51 8 L80 8 M47 24 L76 24 M39 40 L68 40" stroke="#e4005a" stroke-width="7" stroke-linecap="round"/>
      <text x="92" y="35" fill="#e4005a" font-family="Segoe UI, Arial, sans-serif" font-size="32" font-weight="900" font-style="italic">DANHEI</text>
      <text x="99" y="62" fill="#5a2436" font-family="Segoe UI, Arial, sans-serif" font-size="16" font-weight="800" letter-spacing="5">EXPRESS</text>
    </g>
  </g>

  <g font-family="Segoe UI, Arial, sans-serif" filter="url(#softShadow)">
    <g transform="translate(78 268)">
      <rect width="210" height="88" rx="18" fill="#ffffff"/>
      <circle cx="42" cy="44" r="22" fill="url(#pink)"/>
      <text x="42" y="52" text-anchor="middle" fill="#fff" font-size="24" font-weight="900">1</text>
      <text x="78" y="37" fill="#151923" font-size="18" font-weight="900">Solicitas</text>
      <text x="78" y="61" fill="#687083" font-size="13" font-weight="600">por WhatsApp</text>
    </g>
    <g transform="translate(184 610)">
      <rect width="220" height="88" rx="18" fill="#ffffff"/>
      <circle cx="42" cy="44" r="22" fill="url(#pink)"/>
      <text x="42" y="52" text-anchor="middle" fill="#fff" font-size="24" font-weight="900">2</text>
      <text x="78" y="37" fill="#151923" font-size="18" font-weight="900">Recogemos</text>
      <text x="78" y="61" fill="#687083" font-size="13" font-weight="600">en tu ubicacion</text>
    </g>
    <g transform="translate(784 602)">
      <rect width="230" height="88" rx="18" fill="#ffffff"/>
      <circle cx="42" cy="44" r="22" fill="url(#pink)"/>
      <text x="42" y="52" text-anchor="middle" fill="#fff" font-size="24" font-weight="900">3</text>
      <text x="78" y="37" fill="#151923" font-size="18" font-weight="900">Entregamos</text>
      <text x="78" y="61" fill="#687083" font-size="13" font-weight="600">con seguimiento</text>
    </g>
    <g transform="translate(908 270)">
      <rect width="220" height="88" rx="18" fill="#ffffff"/>
      <circle cx="42" cy="44" r="22" fill="url(#pink)"/>
      <text x="42" y="52" text-anchor="middle" fill="#fff" font-size="24" font-weight="900">4</text>
      <text x="78" y="37" fill="#151923" font-size="18" font-weight="900">Confirmamos</text>
      <text x="78" y="61" fill="#687083" font-size="13" font-weight="600">con evidencia</text>
    </g>
  </g>

  <g transform="translate(116 128)" filter="url(#softShadow)">
    <rect width="250" height="72" rx="18" fill="#ffffff"/>
    <circle cx="38" cy="36" r="19" fill="#1dbf73"/>
    <path d="M30 32 C30 26 35 22 40 25 C45 28 47 34 43 39 C40 43 35 43 31 39" fill="none" stroke="#fff" stroke-width="4" stroke-linecap="round"/>
    <text x="72" y="32" fill="#151923" font-family="Segoe UI, Arial, sans-serif" font-size="17" font-weight="900">Solicitud recibida</text>
    <text x="72" y="54" fill="#687083" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="600">Respuesta inmediata</text>
