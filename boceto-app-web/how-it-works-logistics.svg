<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 820" role="img" aria-labelledby="title desc">
  <title id="title">Proceso logistico Danhei Express</title>
  <desc id="desc">Ilustracion de proceso logistico con caja, ruta, app de seguimiento y confirmacion de entrega.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#fff0f6"/>
    </linearGradient>
    <linearGradient id="pink" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f40066"/>
      <stop offset="1" stop-color="#b9004a"/>
    </linearGradient>
    <linearGradient id="boxTop" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f5bd79"/>
      <stop offset="1" stop-color="#d98232"/>
    </linearGradient>
    <linearGradient id="boxSide" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#c96f26"/>
      <stop offset="1" stop-color="#934314"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="28" stdDeviation="28" flood-color="#171b2a" flood-opacity=".18"/>
    </filter>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="14" stdDeviation="16" flood-color="#171b2a" flood-opacity=".14"/>
    </filter>
  </defs>

  <rect width="1200" height="820" rx="42" fill="url(#bg)"/>
  <circle cx="960" cy="140" r="210" fill="#e4005a" opacity=".08"/>
  <circle cx="232" cy="670" r="180" fill="#e4005a" opacity=".06"/>

  <g opacity=".5">
    <path d="M124 612 C292 492 404 698 560 560 S812 322 1046 392" fill="none" stroke="#e4005a" stroke-width="5" stroke-dasharray="18 18"/>
    <path d="M175 250 C330 96 491 160 590 252 S789 456 1026 270" fill="none" stroke="#d8dde8" stroke-width="3" stroke-dasharray="10 16"/>
  </g>

  <g filter="url(#shadow)">
    <path d="M173 578 L545 456 L921 572 L540 716 Z" fill="#171b2a" opacity=".1"/>
    <path d="M204 518 L552 392 L888 512 L540 650 Z" fill="#ffffff"/>
    <path d="M204 518 L540 650 L540 708 L204 574 Z" fill="#f0f3f8"/>
    <path d="M888 512 L540 650 L540 708 L888 566 Z" fill="#dfe5ee"/>
    <path d="M204 518 L552 392 L888 512 L540 650 Z" fill="#ffffff" stroke="#e7ebf2" stroke-width="2"/>
  </g>

  <g filter="url(#softShadow)">
    <rect x="742" y="110" width="250" height="420" rx="34" fill="#151923"/>
    <rect x="760" y="132" width="214" height="376" rx="24" fill="#ffffff"/>
    <rect x="806" y="150" width="122" height="10" rx="5" fill="#2d3342"/>
    <g transform="translate(782 182)">
      <rect width="170" height="48" rx="14" fill="#fff0f6"/>
      <text x="18" y="29" fill="#151923" font-family="Segoe UI, Arial, sans-serif" font-size="19" font-weight="800">#DHE12345</text>
    </g>
    <g transform="translate(782 252)">
      <rect width="170" height="120" rx="16" fill="#f7f8fb"/>
      <path d="M20 82 L58 44 L94 68 L142 28" fill="none" stroke="#e4005a" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
      <circle cx="20" cy="82" r="10" fill="#e4005a" stroke="#fff" stroke-width="5"/>
      <circle cx="94" cy="68" r="10" fill="#e4005a" stroke="#fff" stroke-width="5"/>
      <circle cx="142" cy="28" r="10" fill="#e4005a" stroke="#fff" stroke-width="5"/>
    </g>
    <g transform="translate(790 402)" font-family="Segoe UI, Arial, sans-serif" font-size="15" font-weight="700">
