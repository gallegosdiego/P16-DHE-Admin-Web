      <text x="25" y="13" fill="#4f5665">Pedido recibido</text>
      <circle cx="9" cy="42" r="6" fill="#16a65f"/>
      <text x="25" y="47" fill="#4f5665">Mensajero asignado</text>
      <circle cx="9" cy="76" r="6" fill="#e4005a"/>
      <text x="25" y="81" fill="#e4005a">En ruta</text>
    </g>
  </g>

