  <g transform="translate(853 548)" filter="url(#softShadow)">
    <rect width="230" height="76" rx="18" fill="#151923"/>
    <path d="M40 24 h24 a10 10 0 0 1 10 10 v8 a10 10 0 0 1-10 10 H40 a10 10 0 0 1-10-10 v-8 a10 10 0 0 1 10-10 Z" fill="none" stroke="#fff" stroke-width="5"/>
    <circle cx="52" cy="38" r="8" fill="none" stroke="#fff" stroke-width="4"/>
    <text x="90" y="34" fill="#fff" font-family="Segoe UI, Arial, sans-serif" font-size="16" font-weight="900">Evidencia</text>
    <text x="90" y="56" fill="#cbd1dc" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="600">foto de entrega</text>
  </g>
