    <path d="M498 302 L654 366 L654 414 L498 348 Z" fill="#2b2f3a" opacity=".78"/>
    <path d="M421 332 L570 272 L734 336 L582 407 Z" fill="none" stroke="#7f3a10" stroke-opacity=".18" stroke-width="3"/>
    <g transform="translate(478 416)">
