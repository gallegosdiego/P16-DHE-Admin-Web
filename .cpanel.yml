---
deployment:
  tasks:
    - export DEPLOYPATH=/home/danheiex/api.danheiexpress.com
    - /bin/mkdir -p $DEPLOYPATH
    - /bin/cp -R api/. $DEPLOYPATH/
    - cd $DEPLOYPATH && /usr/local/bin/php /opt/cpanel/composer/bin/composer install --optimize-autoloader --no-dev --no-interaction
    - cd $DEPLOYPATH && /usr/local/bin/php artisan optimize:clear
    - cd $DEPLOYPATH && /usr/local/bin/php artisan config:cache
    - cd $DEPLOYPATH && /usr/local/bin/php artisan view:cache
    - cd $DEPLOYPATH && /usr/local/bin/php deploy-fix.php
    - cd $DEPLOYPATH && /usr/local/bin/php artisan migrate --force
    - cd $DEPLOYPATH && /usr/local/bin/php artisan route:cache
    - cd $DEPLOYPATH && /usr/local/bin/php artisan db:seed --class=RolesAndPermissionsSeeder --force
