---
deployment:
  tasks:
    # Deploy manual desde cPanel.
    # Copia archivos y delega el runtime a un ejecutor con limites y registro.
    # No ejecuta migraciones generales.
    - /bin/mkdir -p /home/danheiex/api.danheiexpress.com
    - /bin/cp -R api/. /home/danheiex/api.danheiexpress.com/
    - /bin/bash /home/danheiex/api.danheiexpress.com/scripts/deploy-cpanel.sh 2>&1
