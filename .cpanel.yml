---
deployment:
  tasks:
    # 1. Variables
    - export DEPLOYPATH=/home/danheiex/api.danheiexpress.com

    # 2. Copiar código (CRÍTICO — debe fallar fuerte)
    - /bin/mkdir -p $DEPLOYPATH
    - /bin/cp -R api/. $DEPLOYPATH/

    # 3. Composer install (CRÍTICO — pero tolerante para no bloquear todo)
    #    Si falla, el vendor viejo sigue funcionando para el código existente
    - cd $DEPLOYPATH && /usr/local/bin/php /opt/cpanel/composer/bin/composer install --optimize-autoloader --no-dev --no-interaction 2>&1 || echo "WARN: composer install falló, continuando con vendor existente"

    # 4. Limpiar caches (no-crítico)
    - cd $DEPLOYPATH && /usr/local/bin/php artisan optimize:clear 2>&1 || echo "WARN: optimize:clear falló"

    # 5. Reparar esquema BD (no-crítico, pero importante)
    - cd $DEPLOYPATH && /usr/local/bin/php deploy-fix.php 2>&1 || echo "WARN: deploy-fix.php falló"

    # 6. Migraciones (importante pero tolerante — si falla, deploy-fix ya reparó lo básico)
    - cd $DEPLOYPATH && /usr/local/bin/php artisan migrate --force 2>&1 || echo "WARN: migrate falló"

    # 6.5. Storage link + directorios de uploads
    - cd $DEPLOYPATH && /usr/local/bin/php artisan storage:link 2>&1 || echo "WARN: storage:link ya existe"
    - /bin/mkdir -p $DEPLOYPATH/storage/app/public/intake $DEPLOYPATH/storage/app/public/evidence

    # 7. Reconstruir caches (no-crítico)
    - cd $DEPLOYPATH && /usr/local/bin/php artisan config:cache 2>&1 || echo "WARN: config:cache falló"
    - cd $DEPLOYPATH && /usr/local/bin/php artisan route:cache 2>&1 || echo "WARN: route:cache falló"
    - cd $DEPLOYPATH && /usr/local/bin/php artisan view:cache 2>&1 || echo "WARN: view:cache falló"

    # 8. Seed roles (tolerante — si no existen aún, el seeder los crea)
    - cd $DEPLOYPATH && /usr/local/bin/php artisan db:seed --class=RolesAndPermissionsSeeder --force 2>&1 || echo "WARN: seeder falló"
